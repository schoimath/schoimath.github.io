<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.affiliation }}{{ end }}">
    <link rel="stylesheet" href="{{ "site.css" | relURL }}">
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="site-title" href="{{ "/" | relURL }}">Suyoung Choi</a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ "/" | relURL }}"{{ if .IsHome }} aria-current="page"{{ end }}>CV</a>
          <a href="{{ "publications/" | relURL }}"{{ if eq .RelPermalink ("/publications/" | relURL) }} aria-current="page"{{ end }}>Publications</a>
          <a href="{{ "outreach/" | relURL }}"{{ if eq .RelPermalink ("/outreach/" | relURL) }} aria-current="page"{{ end }}>Outreach</a>
          <a href="{{ "supervision/" | relURL }}"{{ if eq .RelPermalink ("/supervision/" | relURL) }} aria-current="page"{{ end }}>Supervision</a>
          <a href="{{ "talks/" | relURL }}"{{ if eq .RelPermalink ("/talks/" | relURL) }} aria-current="page"{{ end }}>Talks</a>
          <a href="{{ "teaching/" | relURL }}"{{ if eq .RelPermalink ("/teaching/" | relURL) }} aria-current="page"{{ end }}>Teaching</a>
        </nav>
      </div>
    </header>
    {{ block "main" . }}{{ end }}
    <script>
      (function () {
        const article = document.querySelector('.legacy-content');
        const toc = document.querySelector('[data-page-toc]');
        const tocLinks = document.querySelector('[data-page-toc-links]');

        const usedIds = new Set();
        const slugify = (text) => {
          const base = (text || '')
            .toLowerCase()
            .trim()
            .replace(/&[a-z0-9#]+;/gi, '')
            .replace(/[^\p{L}\p{N}\s-]/gu, '')
            .replace(/\s+/g, '-')
            .replace(/-+/g, '-')
            .replace(/^-|-$/g, '') || 'section';

          let slug = base;
          let index = 2;
          while (usedIds.has(slug)) {
            slug = `${base}-${index++}`;
          }
          usedIds.add(slug);
          return slug;
        };

        window.buildPageToc = function buildPageToc(scope) {
          if (!article || !toc || !tocLinks) return;

          const target = scope || article;
          const headings = Array.from(target.querySelectorAll('h3'));
          tocLinks.innerHTML = '';

          if (!headings.length) {
            toc.hidden = true;
            return;
          }

          headings.forEach((heading) => {
            if (!heading.id) heading.id = slugify(heading.textContent);

            const link = document.createElement('a');
            link.href = `#${heading.id}`;
            link.textContent = heading.textContent.trim();
            link.className = 'toc-item';
            tocLinks.appendChild(link);
          });

          toc.hidden = false;
        };

        window.buildPageToc();
      })();

      (function () {
        const talksViews = document.querySelector('[data-talks-views]');
        const buttons = Array.from(document.querySelectorAll('[data-talks-view-button]'));
        const photoToggle = document.querySelector('[data-talks-photo-toggle]');
        if (!talksViews || !buttons.length) return;

        const categoryView = talksViews.querySelector('[data-talks-view="category"]');
        const yearView = talksViews.querySelector('[data-talks-view="year"]');
        const countryView = talksViews.querySelector('[data-talks-view="country"]');
        const talkItems = Array.from(categoryView.querySelectorAll('.talk-item'));
        if (!categoryView || !yearView || !countryView || !talkItems.length) return;

        let photosEnabled = true;

        const parsePhotos = (item) => {
          const raw = item.dataset.talkPhotos || '';
          return raw ? raw.split('||').filter(Boolean) : [];
        };

        const buildPhotoUrl = (talkId, photo) => {
          if (!photo) return '';
          if (photo.startsWith('/') || photo.startsWith('http://') || photo.startsWith('https://')) return photo;
          return `/talks/images/${talkId}/${photo}`;
        };

        const closeInlineViewer = (item) => {
          const viewer = item.querySelector('.talk-photo-viewer');
          if (!viewer) return;
          viewer.remove();
          const activeThumb = item.querySelector('.talk-photo-thumb.is-active');
          if (activeThumb) activeThumb.classList.remove('is-active');
        };

        const openInlineViewer = (item, src) => {
          if (!src) return;
          const current = item.querySelector('.talk-photo-thumb.is-active');
          if (current && current.dataset.fullSrc === src) {
            closeInlineViewer(item);
            return;
          }

          if (current) current.classList.remove('is-active');
          const next = Array.from(item.querySelectorAll('.talk-photo-thumb'))
            .find((thumb) => thumb.dataset.fullSrc === src);
          if (next) next.classList.add('is-active');

          const existing = item.querySelector('.talk-photo-viewer');
          if (existing) existing.remove();

          const viewer = document.createElement('div');
          viewer.className = 'talk-photo-viewer';

          const image = document.createElement('img');
          image.src = src;
          image.alt = 'Talk photo enlarged';
          image.loading = 'lazy';
          viewer.appendChild(image);

          item.appendChild(viewer);
        };

        const renderPhotosForItem = (item, entry) => {
          const existing = item.querySelector('.talk-item-photos');
          if (existing) existing.remove();
          closeInlineViewer(item);
          if (!photosEnabled || !entry.talkId || !entry.photos.length) return;

          const strip = document.createElement('div');
          strip.className = 'talk-item-photos';

          entry.photos.slice(0, 4).forEach((photo) => {
            const src = buildPhotoUrl(entry.talkId, photo);
            if (!src) return;

            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'talk-photo-thumb';
            button.dataset.fullSrc = src;
            button.style.width = '112px';
            button.style.height = '84px';
            button.style.overflow = 'hidden';
            button.style.padding = '0';
            button.style.display = 'inline-block';

            const image = document.createElement('img');
            image.src = src;
            image.alt = `Talk photo`;
            image.loading = 'lazy';
            image.style.width = '100%';
            image.style.height = '100%';
            image.style.objectFit = 'cover';
            image.style.display = 'block';

            button.appendChild(image);
            strip.appendChild(button);
          });

          if (strip.childElementCount) item.appendChild(strip);
        };

        const makeEntryFromItem = (item) => ({
          category: item.dataset.talkCategory,
          year: item.dataset.talkYear,
          country: item.querySelector('.talk-item-event strong')?.textContent?.trim() || 'Other',
          eventHtml: item.querySelector('.talk-item-event')?.innerHTML || '',
          titleHtml: item.querySelector('.talk-item-title')?.innerHTML || '',
          talkId: item.dataset.talkId || '',
          photos: parsePhotos(item)
        });

        const buildTalkItem = (entry, includeYear) => {
          const item = document.createElement('li');
          item.className = 'talk-item';
          item.dataset.talkCategory = entry.category || '';
          item.dataset.talkYear = entry.year || '';
          if (entry.talkId) item.dataset.talkId = entry.talkId;
          if (entry.photos && entry.photos.length) item.dataset.talkPhotos = entry.photos.join('||');

          const event = document.createElement('div');
          event.className = 'talk-item-event';
          event.innerHTML = entry.eventHtml;
          item.appendChild(event);

          if (entry.titleHtml) {
            const title = document.createElement('div');
            title.className = 'talk-item-title';
            title.innerHTML = entry.titleHtml;
            item.appendChild(title);
          }

          if (includeYear) {
            const yearTag = document.createElement('div');
            yearTag.className = 'talk-item-category';
            yearTag.textContent = String(entry.year);
            item.appendChild(yearTag);
          }

          const category = document.createElement('div');
          category.className = 'talk-item-category';
          category.textContent = entry.category;
          item.appendChild(category);

          renderPhotosForItem(item, entry);
          return item;
        };

        const groupedByYear = new Map();
        const groupedByCountry = new Map();
        talkItems.forEach((item) => {
          const entry = makeEntryFromItem(item);
          const year = entry.year;
          const country = entry.country;

          if (!groupedByYear.has(year)) groupedByYear.set(year, []);
          groupedByYear.get(year).push(entry);

          if (!groupedByCountry.has(country)) groupedByCountry.set(country, []);
          groupedByCountry.get(country).push(entry);
        });

        Array.from(groupedByYear.keys())
          .sort((a, b) => Number(b) - Number(a))
          .forEach((year) => {
            const section = document.createElement('section');
            section.className = 'talks-section';

            const heading = document.createElement('h3');
            heading.textContent = year;
            section.appendChild(heading);

            const list = document.createElement('ul');
            groupedByYear.get(year).forEach((entry) => {
              list.appendChild(buildTalkItem(entry, false));
            });

            section.appendChild(list);
            yearView.appendChild(section);
          });

        Array.from(groupedByCountry.keys())
          .sort((a, b) => a.localeCompare(b))
          .forEach((country) => {
            const section = document.createElement('section');
            section.className = 'talks-section';

            const heading = document.createElement('h3');
            heading.textContent = country;
            section.appendChild(heading);

            const list = document.createElement('ul');
            groupedByCountry.get(country)
              .sort((a, b) => Number(b.year) - Number(a.year))
              .forEach((entry) => {
                list.appendChild(buildTalkItem(entry, true));
              });

            section.appendChild(list);
            countryView.appendChild(section);
          });

        const syncPhotosInContainer = (container) => {
          const items = Array.from(container.querySelectorAll('.talk-item'));
          items.forEach((item) => renderPhotosForItem(item, makeEntryFromItem(item)));
        };

        const setView = (view) => {
          categoryView.hidden = view !== 'category';
          yearView.hidden = view !== 'year';
          countryView.hidden = view !== 'country';

          buttons.forEach((button) => {
            const active = button.dataset.view === view;
            button.classList.toggle('is-active', active);
            button.setAttribute('aria-pressed', active ? 'true' : 'false');
          });

          if (typeof window.buildPageToc === 'function') {
            const activeView =
              view === 'year' ? yearView :
              view === 'country' ? countryView :
              categoryView;
            window.buildPageToc(activeView);
          }
        };

        buttons.forEach((button) => {
          button.addEventListener('click', () => setView(button.dataset.view));
        });

        if (photoToggle) {
          photoToggle.classList.add('is-active');
          photoToggle.setAttribute('aria-pressed', 'true');
          photoToggle.textContent = 'Hide Photos';
          photoToggle.addEventListener('click', () => {
            photosEnabled = !photosEnabled;
            photoToggle.classList.toggle('is-active', photosEnabled);
            photoToggle.setAttribute('aria-pressed', photosEnabled ? 'true' : 'false');
            photoToggle.textContent = photosEnabled ? 'Hide Photos' : 'Show Photos';

            syncPhotosInContainer(categoryView);
            syncPhotosInContainer(yearView);
            syncPhotosInContainer(countryView);
            setView(categoryView.hidden ? (yearView.hidden ? 'country' : 'year') : 'category');
          });
        }

        talksViews.addEventListener('click', (event) => {
          const trigger = event.target.closest('.talk-photo-thumb');
          if (!trigger) return;
          const item = trigger.closest('.talk-item');
          if (!item) return;
          openInlineViewer(item, trigger.dataset.fullSrc);
        });

        syncPhotosInContainer(categoryView);
        syncPhotosInContainer(yearView);
        syncPhotosInContainer(countryView);
        setView('category');
      })();

      (function () {
        const publicationViews = document.querySelector('[data-publications-views]');
        const buttons = Array.from(document.querySelectorAll('[data-publications-view-button]'));
        if (!publicationViews || !buttons.length) return;

        const categoryView = publicationViews.querySelector('[data-publications-view="category"]');
        const yearView = publicationViews.querySelector('[data-publications-view="year"]');
        const authorView = publicationViews.querySelector('[data-publications-view="author"]');
        const journalView = publicationViews.querySelector('[data-publications-view="journal"]');
        const items = Array.from(categoryView.querySelectorAll('.publication-item'));
        if (!categoryView || !yearView || !authorView || !journalView || !items.length) return;

        const numberedCategories = new Set(['Mathematics', 'Applied Mathematics']);
        const numberedItems = items.filter((item) =>
          numberedCategories.has(item.dataset.publicationCategory) && item.dataset.publicationYear
        );

        const groupedByYear = new Map();
        numberedItems.forEach((item) => {
          const year = item.dataset.publicationYear;
          if (!groupedByYear.has(year)) groupedByYear.set(year, []);
          groupedByYear.get(year).push({
            category: item.dataset.publicationCategory,
            html: item.innerHTML
          });
        });

        yearView.innerHTML = '';
        yearView.classList.add('publication-year-view');

        let currentNumber = numberedItems.length;

        Array.from(groupedByYear.keys())
          .sort((a, b) => Number(b) - Number(a))
          .forEach((year) => {
            const section = document.createElement('section');
            section.className = 'publications-section';

            const heading = document.createElement('h3');
            heading.textContent = year;
            section.appendChild(heading);

            const list = document.createElement('ul');
            groupedByYear.get(year).forEach((entry) => {
              const item = document.createElement('li');
              item.className = 'publication-item';
              item.innerHTML = entry.html;

              const number = item.querySelector('.publication-number');
              if (number) {
                number.textContent = `[${currentNumber--}]`;
              }

              const category = document.createElement('div');
              category.className = 'talk-item-category';
              category.textContent = entry.category;
              item.appendChild(category);

              list.appendChild(item);
            });

            section.appendChild(list);
            yearView.appendChild(section);
          });

        const extraSections = Array.from(categoryView.querySelectorAll('.publications-section')).filter((section) => {
          const title = section.querySelector('h3')?.textContent?.trim();
          return title && !numberedCategories.has(title);
        });

        extraSections.forEach((section) => {
          yearView.appendChild(section.cloneNode(true));
        });

        const authorGroups = new Map();
        items.forEach((item) => {
          const authors = Array.from(item.querySelectorAll('.publication-author'));
          authors.forEach((author) => {
            const id = author.dataset.authorId;
            const name = author.dataset.authorName;
            if (!id || id === 'suyoung-choi' || !name) return;

            if (!authorGroups.has(id)) {
              authorGroups.set(id, {
                id,
                name,
                sortName: author.dataset.authorSort || name,
                url: author.dataset.authorUrl || '',
                entries: []
              });
            }

            authorGroups.get(id).entries.push({
              category: item.dataset.publicationCategory,
              html: item.innerHTML
            });
          });
        });

        Array.from(authorGroups.values())
          .sort((a, b) => a.sortName.localeCompare(b.sortName))
          .forEach((author) => {
            const section = document.createElement('section');
            section.className = 'publications-section';

            const heading = document.createElement('h3');
            if (author.url) {
              const link = document.createElement('a');
              link.href = author.url;
              link.textContent = author.name;
              heading.appendChild(link);
            } else {
              heading.textContent = author.name;
            }
            section.appendChild(heading);

            const list = document.createElement('ul');
            author.entries.forEach((entry) => {
              const item = document.createElement('li');
              item.className = 'publication-item';
              item.innerHTML = entry.html;

              const category = document.createElement('div');
              category.className = 'talk-item-category';
              category.textContent = entry.category;
              item.appendChild(category);

              list.appendChild(item);
            });

            section.appendChild(list);
            authorView.appendChild(section);
          });

        const journalGroups = new Map();
        items.forEach((item) => {
          const journal = item.querySelector('.publication-venue');
          const id = journal?.dataset.journalId;
          const name = journal?.dataset.journalName;
          if (!id || !name) return;

          if (!journalGroups.has(id)) {
            journalGroups.set(id, {
              id,
              name,
              heading: journal.dataset.journalHeading || name,
              sortName: journal.dataset.journalSort || name,
              url: journal.dataset.journalUrl || '',
              entries: []
            });
          }

          journalGroups.get(id).entries.push({
            category: item.dataset.publicationCategory,
            html: item.innerHTML
          });
        });

        Array.from(journalGroups.values())
          .sort((a, b) => a.sortName.localeCompare(b.sortName))
          .forEach((journal) => {
            const section = document.createElement('section');
            section.className = 'publications-section';

            const heading = document.createElement('h3');
            if (journal.url) {
              const link = document.createElement('a');
              link.href = journal.url;
              link.textContent = journal.heading;
              heading.appendChild(link);
            } else {
              heading.textContent = journal.heading;
            }
            section.appendChild(heading);

            const list = document.createElement('ul');
            journal.entries.forEach((entry) => {
              const item = document.createElement('li');
              item.className = 'publication-item';
              item.innerHTML = entry.html;

              const category = document.createElement('div');
              category.className = 'talk-item-category';
              category.textContent = entry.category;
              item.appendChild(category);

              list.appendChild(item);
            });

            section.appendChild(list);
            journalView.appendChild(section);
          });

        const setView = (view) => {
          categoryView.hidden = view !== 'category';
          yearView.hidden = view !== 'year';
          authorView.hidden = view !== 'author';
          journalView.hidden = view !== 'journal';

          buttons.forEach((button) => {
            const active = button.dataset.view === view;
            button.classList.toggle('is-active', active);
            button.setAttribute('aria-pressed', active ? 'true' : 'false');
          });

          if (typeof window.buildPageToc === 'function') {
            const activeView =
              view === 'year' ? yearView :
              view === 'journal' ? journalView :
              view === 'author' ? authorView :
              categoryView;
            window.buildPageToc(activeView);
          }
        };

        buttons.forEach((button) => {
          button.addEventListener('click', () => setView(button.dataset.view));
        });

        setView('category');
      })();
    </script>
  </body>
</html>
