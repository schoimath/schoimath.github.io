<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.affiliation }}{{ end }}">
    <link rel="stylesheet" href="{{ "site.css" | relURL }}?v={{ now.Unix }}">
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="site-title" href="{{ "/" | relURL }}">Suyoung Choi</a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ "/" | relURL }}"{{ if .IsHome }} aria-current="page"{{ end }}>CV</a>
          <a href="{{ "publications/" | relURL }}"{{ if eq .RelPermalink ("/publications/" | relURL) }} aria-current="page"{{ end }}>Publications</a>
          <a href="{{ "outreach/" | relURL }}"{{ if eq .RelPermalink ("/outreach/" | relURL) }} aria-current="page"{{ end }}>Outreach</a>
          <a href="{{ "supervision/" | relURL }}"{{ if eq .RelPermalink ("/supervision/" | relURL) }} aria-current="page"{{ end }}>Supervision</a>
          <a href="{{ "talks/" | relURL }}"{{ if eq .RelPermalink ("/talks/" | relURL) }} aria-current="page"{{ end }}>Talks</a>
          <a href="{{ "teaching/" | relURL }}"{{ if eq .RelPermalink ("/teaching/" | relURL) }} aria-current="page"{{ end }}>Teaching</a>
        </nav>
      </div>
    </header>
    {{ block "main" . }}{{ end }}
    <script>
      (function () {
        const article = document.querySelector('.legacy-content');
        const toc = document.querySelector('[data-page-toc]');
        const tocLinks = document.querySelector('[data-page-toc-links]');

        const usedIds = new Set();
        const slugify = (text) => {
          const base = (text || '')
            .toLowerCase()
            .trim()
            .replace(/&[a-z0-9#]+;/gi, '')
            .replace(/[^\p{L}\p{N}\s-]/gu, '')
            .replace(/\s+/g, '-')
            .replace(/-+/g, '-')
            .replace(/^-|-$/g, '') || 'section';

          let slug = base;
          let index = 2;
          while (usedIds.has(slug)) {
            slug = `${base}-${index++}`;
          }
          usedIds.add(slug);
          return slug;
        };

        window.buildPageToc = function buildPageToc(scope) {
          if (!article || !toc || !tocLinks) return;

          const target = scope || article;
          const headings = Array.from(target.querySelectorAll('h3'));
          tocLinks.innerHTML = '';

          if (!headings.length) {
            toc.hidden = true;
            return;
          }

          headings.forEach((heading) => {
            if (!heading.id) heading.id = slugify(heading.textContent);

            const link = document.createElement('a');
            link.href = `#${heading.id}`;
            link.textContent = heading.textContent.trim();
            link.className = 'toc-item';
            tocLinks.appendChild(link);
          });

          toc.hidden = false;
        };

        window.buildPageToc();
      })();

      (function () {
        const talksViews = document.querySelector('[data-talks-views]');
        const buttons = Array.from(document.querySelectorAll('[data-talks-view-button]'));
        const photoToggle = document.querySelector('[data-talks-photo-toggle]');
        if (!talksViews || !buttons.length) return;

        const categoryView = talksViews.querySelector('[data-talks-view="category"]');
        const yearView = talksViews.querySelector('[data-talks-view="year"]');
        const countryView = talksViews.querySelector('[data-talks-view="country"]');
        const authorLinkNode = document.getElementById('talks-author-links');
        let talkAuthorLinks = [];
        if (authorLinkNode) {
          try {
            let parsedAuthorLinks = JSON.parse(authorLinkNode.textContent || '[]');
            if (typeof parsedAuthorLinks === 'string') {
              parsedAuthorLinks = JSON.parse(parsedAuthorLinks);
            }
            talkAuthorLinks = parsedAuthorLinks
              .filter((entry) => entry && entry.name && entry.url)
              .sort((a, b) => b.name.length - a.name.length);
          } catch (_error) {
            talkAuthorLinks = [];
          }
        }

        const isAsciiWordChar = (char) => /[A-Za-z0-9]/.test(char || '');

        const replaceAuthorNamesInTextNode = (node) => {
          if (!node || !node.nodeValue || !talkAuthorLinks.length) return;
          const text = node.nodeValue;
          let cursor = 0;
          let changed = false;
          const fragment = document.createDocumentFragment();

          const findNextMatch = (startIndex) => {
            let best = null;
            for (const author of talkAuthorLinks) {
              let index = text.indexOf(author.name, startIndex);
              while (index !== -1) {
                const before = index > 0 ? text[index - 1] : '';
                const afterIndex = index + author.name.length;
                const after = afterIndex < text.length ? text[afterIndex] : '';
                const validBoundary = !isAsciiWordChar(before) && !isAsciiWordChar(after);
                if (validBoundary) {
                  if (!best || index < best.index || (index === best.index && author.name.length > best.name.length)) {
                    best = { index, ...author };
                  }
                  break;
                }
                index = text.indexOf(author.name, index + author.name.length);
              }
            }
            return best;
          };

          while (cursor < text.length) {
            const match = findNextMatch(cursor);
            if (!match) break;

            if (match.index > cursor) {
              fragment.appendChild(document.createTextNode(text.slice(cursor, match.index)));
            }

            const link = document.createElement('a');
            link.href = match.url;
            link.textContent = match.name;
            link.className = 'talk-author-link';
            fragment.appendChild(link);

            cursor = match.index + match.name.length;
            changed = true;
          }

          if (!changed) return;
          if (cursor < text.length) {
            fragment.appendChild(document.createTextNode(text.slice(cursor)));
          }
          node.parentNode.replaceChild(fragment, node);
        };

        const linkTalkAuthors = (container) => {
          if (!container || !talkAuthorLinks.length) return;
          const targets = container.querySelectorAll('.talk-item-event, .talk-item-title');
          targets.forEach((target) => {
            const walker = document.createTreeWalker(target, NodeFilter.SHOW_TEXT);
            const textNodes = [];
            let current = walker.nextNode();
            while (current) {
              if (!current.parentElement?.closest('a')) textNodes.push(current);
              current = walker.nextNode();
            }
            textNodes.forEach(replaceAuthorNamesInTextNode);
          });
        };

        linkTalkAuthors(categoryView);

        const talkItems = Array.from(categoryView.querySelectorAll('.talk-item'));
        if (!categoryView || !yearView || !countryView || !talkItems.length) return;

        let photosEnabled = true;

        const parsePhotos = (item) => {
          const raw = item.dataset.talkPhotos || '';
          return raw ? raw.split('||').filter(Boolean) : [];
        };

        const buildPhotoUrl = (talkId, photo) => {
          if (!photo) return '';
          if (photo.startsWith('/') || photo.startsWith('http://') || photo.startsWith('https://')) return photo;
          return `/talks/images/${talkId}/${photo}`;
        };

        const buildThumbUrl = (talkId, photo) => {
          if (!photo) return '';
          if (photo.startsWith('/') || photo.startsWith('http://') || photo.startsWith('https://')) return photo;
          return `/talks/images/${talkId}/thumbs/${photo}`;
        };

        const closeInlineViewer = (item) => {
          const viewer = item.querySelector('.talk-photo-viewer');
          if (!viewer) return;
          viewer.remove();
          const activeThumb = item.querySelector('.talk-photo-thumb.is-active');
          if (activeThumb) activeThumb.classList.remove('is-active');
        };

        const openInlineViewer = (item, src, thumbSrc) => {
          if (!src) return;
          const current = item.querySelector('.talk-photo-thumb.is-active');
          if (current && current.dataset.fullSrc === src) {
            closeInlineViewer(item);
            return;
          }

          if (current) current.classList.remove('is-active');
          const next = Array.from(item.querySelectorAll('.talk-photo-thumb'))
            .find((thumb) => thumb.dataset.fullSrc === src);
          if (next) next.classList.add('is-active');

          const existing = item.querySelector('.talk-photo-viewer');
          if (existing) existing.remove();

          const viewer = document.createElement('div');
          viewer.className = 'talk-photo-viewer';

          const image = document.createElement('img');
          image.src = src;
          image.alt = 'Talk photo enlarged';
          image.loading = 'lazy';
          image.onerror = () => {
            if (thumbSrc && image.src !== thumbSrc) {
              image.src = thumbSrc;
            }
          };
          viewer.appendChild(image);

          item.appendChild(viewer);
        };

        const renderPhotosForItem = (item, entry) => {
          const existing = item.querySelector('.talk-item-photos');
          if (existing) existing.remove();
          closeInlineViewer(item);
          if (!photosEnabled || !entry.talkId || !entry.photos.length) return;

          const strip = document.createElement('div');
          strip.className = 'talk-item-photos';

          entry.photos.slice(0, 4).forEach((photo) => {
            const src = buildPhotoUrl(entry.talkId, photo);
            const thumb = buildThumbUrl(entry.talkId, photo);
            if (!src) return;

            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'talk-photo-thumb';
            button.dataset.fullSrc = src;
            button.dataset.thumbSrc = thumb || src;
            button.style.width = '112px';
            button.style.height = '84px';
            button.style.overflow = 'hidden';
            button.style.padding = '0';
            button.style.display = 'inline-block';

            const image = document.createElement('img');
            image.src = thumb || src;
            image.alt = `Talk photo`;
            image.loading = 'lazy';
            image.onerror = () => {
              if (image.src !== src) image.src = src;
            };
            image.style.width = '100%';
            image.style.height = '100%';
            image.style.objectFit = 'cover';
            image.style.display = 'block';

            button.appendChild(image);
            strip.appendChild(button);
          });

          if (strip.childElementCount) item.appendChild(strip);
        };

        const makeEntryFromItem = (item) => ({
          category: item.dataset.talkCategory,
          year: item.dataset.talkYear,
          country: item.querySelector('.talk-item-event strong')?.textContent?.trim() || 'Other',
          eventHtml: item.querySelector('.talk-item-event')?.innerHTML || '',
          titleHtml: item.querySelector('.talk-item-title')?.innerHTML || '',
          talkId: item.dataset.talkId || '',
          photos: parsePhotos(item)
        });

        const buildTalkItem = (entry, includeYear) => {
          const item = document.createElement('li');
          item.className = 'talk-item';
          item.dataset.talkCategory = entry.category || '';
          item.dataset.talkYear = entry.year || '';
          if (entry.talkId) item.dataset.talkId = entry.talkId;
          if (entry.photos && entry.photos.length) item.dataset.talkPhotos = entry.photos.join('||');

          const event = document.createElement('div');
          event.className = 'talk-item-event';
          event.innerHTML = entry.eventHtml;
          item.appendChild(event);

          if (entry.titleHtml) {
            const title = document.createElement('div');
            title.className = 'talk-item-title';
            title.innerHTML = entry.titleHtml;
            item.appendChild(title);
          }

          if (includeYear) {
            const yearTag = document.createElement('div');
            yearTag.className = 'talk-item-category';
            yearTag.textContent = String(entry.year);
            item.appendChild(yearTag);
          }

          const category = document.createElement('div');
          category.className = 'talk-item-category';
          category.textContent = entry.category;
          item.appendChild(category);

          renderPhotosForItem(item, entry);
          return item;
        };

        const groupedByYear = new Map();
        const groupedByCountry = new Map();
        talkItems.forEach((item) => {
          const entry = makeEntryFromItem(item);
          const year = entry.year;
          const country = entry.country;

          if (!groupedByYear.has(year)) groupedByYear.set(year, []);
          groupedByYear.get(year).push(entry);

          if (!groupedByCountry.has(country)) groupedByCountry.set(country, []);
          groupedByCountry.get(country).push(entry);
        });

        Array.from(groupedByYear.keys())
          .sort((a, b) => Number(b) - Number(a))
          .forEach((year) => {
            const section = document.createElement('section');
            section.className = 'talks-section';

            const heading = document.createElement('h3');
            heading.textContent = `${year} (${groupedByYear.get(year).length})`;
            section.appendChild(heading);

            const list = document.createElement('ul');
            groupedByYear.get(year).forEach((entry) => {
              list.appendChild(buildTalkItem(entry, false));
            });

            section.appendChild(list);
            yearView.appendChild(section);
          });

        Array.from(groupedByCountry.keys())
          .sort((a, b) => a.localeCompare(b))
          .forEach((country) => {
            const section = document.createElement('section');
            section.className = 'talks-section';

            const heading = document.createElement('h3');
            heading.textContent = `${country} (${groupedByCountry.get(country).length})`;
            section.appendChild(heading);

            const list = document.createElement('ul');
            groupedByCountry.get(country)
              .sort((a, b) => Number(b.year) - Number(a.year))
              .forEach((entry) => {
                list.appendChild(buildTalkItem(entry, true));
              });

            section.appendChild(list);
            countryView.appendChild(section);
          });

        const syncPhotosInContainer = (container) => {
          const items = Array.from(container.querySelectorAll('.talk-item'));
          items.forEach((item) => renderPhotosForItem(item, makeEntryFromItem(item)));
        };

        const setView = (view) => {
          categoryView.hidden = view !== 'category';
          yearView.hidden = view !== 'year';
          countryView.hidden = view !== 'country';

          buttons.forEach((button) => {
            const active = button.dataset.view === view;
            button.classList.toggle('is-active', active);
            button.setAttribute('aria-pressed', active ? 'true' : 'false');
          });

          if (typeof window.buildPageToc === 'function') {
            const activeView =
              view === 'year' ? yearView :
              view === 'country' ? countryView :
              categoryView;
            window.buildPageToc(activeView);
          }
        };

        buttons.forEach((button) => {
          button.addEventListener('click', () => setView(button.dataset.view));
        });

        if (photoToggle) {
          photoToggle.classList.remove('is-active');
          photoToggle.setAttribute('aria-pressed', 'false');
          photoToggle.textContent = 'Hide Photos';
          photoToggle.addEventListener('click', () => {
            photosEnabled = !photosEnabled;
            photoToggle.classList.toggle('is-active', !photosEnabled);
            photoToggle.setAttribute('aria-pressed', photosEnabled ? 'false' : 'true');
            photoToggle.textContent = photosEnabled ? 'Hide Photos' : 'Show Photos';

            syncPhotosInContainer(categoryView);
            syncPhotosInContainer(yearView);
            syncPhotosInContainer(countryView);
            setView(categoryView.hidden ? (yearView.hidden ? 'country' : 'year') : 'category');
          });
        }

        talksViews.addEventListener('click', (event) => {
          const trigger = event.target.closest('.talk-photo-thumb');
          if (!trigger) return;
          const item = trigger.closest('.talk-item');
          if (!item) return;
          openInlineViewer(item, trigger.dataset.fullSrc, trigger.dataset.thumbSrc);
        });

        syncPhotosInContainer(categoryView);
        syncPhotosInContainer(yearView);
        syncPhotosInContainer(countryView);
        setView('category');
      })();

      (function () {
        const publicationViews = document.querySelector('[data-publications-views]');
        const buttons = Array.from(document.querySelectorAll('[data-publications-view-button]'));
        const searchInput = document.querySelector('[data-publications-search]');
        const searchStatus = document.querySelector('[data-publications-search-status]');
        const searchResults = document.querySelector('[data-publications-search-results]');
        if (!publicationViews || !buttons.length) return;

        const categoryView = publicationViews.querySelector('[data-publications-view="category"]');
        const yearView = publicationViews.querySelector('[data-publications-view="year"]');
        const authorView = publicationViews.querySelector('[data-publications-view="author"]');
        const journalView = publicationViews.querySelector('[data-publications-view="journal"]');
        const items = Array.from(categoryView.querySelectorAll('.publication-item'));
        if (!categoryView || !yearView || !authorView || !journalView || !items.length) return;

        const numberedCategories = new Set(['Mathematics', 'Applied Mathematics']);
        const numberedItems = items.filter((item) =>
          numberedCategories.has(item.dataset.publicationCategory) && item.dataset.publicationYear
        );

        const groupedByYear = new Map();
        numberedItems.forEach((item) => {
          const year = item.dataset.publicationYear;
          if (!groupedByYear.has(year)) groupedByYear.set(year, []);
          groupedByYear.get(year).push({
            category: item.dataset.publicationCategory,
            html: item.innerHTML
          });
        });

        yearView.innerHTML = '';
        yearView.classList.add('publication-year-view');

        const sortedYears = Array.from(groupedByYear.keys()).sort((a, b) => Number(b) - Number(a));

        sortedYears.forEach((year) => {
          const section = document.createElement('section');
          section.className = 'publications-section';
          section.dataset.publicationYearSection = year;

          const heading = document.createElement('h3');
          heading.textContent = `${year} (${groupedByYear.get(year).length})`;
          section.appendChild(heading);

          const list = document.createElement('ul');
          let yearNumber = groupedByYear.get(year).length;
          groupedByYear.get(year).forEach((entry) => {
            const item = document.createElement('li');
            item.className = 'publication-item';
            item.innerHTML = entry.html;

            const number = item.querySelector('.publication-number');
            if (number) {
              number.textContent = `[${yearNumber--}]`;
            }

            const category = document.createElement('div');
            category.className = 'talk-item-category';
            category.textContent = entry.category;
            item.appendChild(category);

            list.appendChild(item);
          });

          section.appendChild(list);
          yearView.appendChild(section);
        });

        const authorGroups = new Map();
        const soloEntries = [];
        items.forEach((item) => {
          const authors = Array.from(item.querySelectorAll('.publication-author'));
          if (
            authors.length === 1 &&
            (
              authors[0].dataset.authorId === 'suyoung-choi' ||
              (authors[0].dataset.authorName || '').trim() === 'Suyoung Choi'
            )
          ) {
            soloEntries.push({
              category: item.dataset.publicationCategory,
              html: item.innerHTML
            });
          }

          authors.forEach((author) => {
            const id = author.dataset.authorId;
            const name = author.dataset.authorName;
            if (!id || id === 'suyoung-choi' || !name) return;

            if (!authorGroups.has(id)) {
              authorGroups.set(id, {
                id,
                name,
                sortName: author.dataset.authorSort || name,
                url: author.dataset.authorUrl || '',
                entries: []
              });
            }

            authorGroups.get(id).entries.push({
              category: item.dataset.publicationCategory,
              html: item.innerHTML
            });
          });
        });

        if (soloEntries.length) {
          const section = document.createElement('section');
          section.className = 'publications-section';

          const heading = document.createElement('h3');
          heading.textContent = `Solo Papers (${soloEntries.length})`;
          section.appendChild(heading);

          const list = document.createElement('ul');
          let soloNumber = soloEntries.length;
          soloEntries.forEach((entry) => {
            const item = document.createElement('li');
            item.className = 'publication-item';
            item.innerHTML = entry.html;

            const number = item.querySelector('.publication-number');
            if (number) {
              number.textContent = `[${soloNumber--}]`;
            }

            const category = document.createElement('div');
            category.className = 'talk-item-category';
            category.textContent = entry.category;
            item.appendChild(category);

            list.appendChild(item);
          });

          section.appendChild(list);
          authorView.appendChild(section);
        }

        Array.from(authorGroups.values())
          .sort((a, b) => a.sortName.localeCompare(b.sortName))
          .forEach((author) => {
            const section = document.createElement('section');
            section.className = 'publications-section';

            const heading = document.createElement('h3');
            const authorCount = author.entries.length;
            if (author.url) {
              const link = document.createElement('a');
              link.href = author.url;
              link.textContent = author.name;
              heading.appendChild(link);
              heading.appendChild(document.createTextNode(` (${authorCount})`));
            } else {
              heading.textContent = `${author.name} (${authorCount})`;
            }
            section.appendChild(heading);

            const list = document.createElement('ul');
            let authorNumber = author.entries.length;
            author.entries.forEach((entry) => {
              const item = document.createElement('li');
              item.className = 'publication-item';
              item.innerHTML = entry.html;

              const number = item.querySelector('.publication-number');
              if (number) {
                number.textContent = `[${authorNumber--}]`;
              }

              const category = document.createElement('div');
              category.className = 'talk-item-category';
              category.textContent = entry.category;
              item.appendChild(category);

              list.appendChild(item);
            });

            section.appendChild(list);
            authorView.appendChild(section);
          });

        const journalGroups = new Map();
        items.forEach((item) => {
          const journal = item.querySelector('.publication-venue');
          const id = journal?.dataset.journalId;
          const name = journal?.dataset.journalName;
          if (!id || !name) return;

          if (!journalGroups.has(id)) {
            journalGroups.set(id, {
              id,
              name,
              heading: journal.dataset.journalHeading || name,
              sortName: journal.dataset.journalSort || name,
              url: journal.dataset.journalUrl || '',
              entries: []
            });
          }

          journalGroups.get(id).entries.push({
            category: item.dataset.publicationCategory,
            html: item.innerHTML
          });
        });

        Array.from(journalGroups.values())
          .sort((a, b) => a.sortName.localeCompare(b.sortName))
          .forEach((journal) => {
            const section = document.createElement('section');
            section.className = 'publications-section';

            const heading = document.createElement('h3');
            const journalCount = journal.entries.length;
            if (journal.url) {
              const link = document.createElement('a');
              link.href = journal.url;
              link.textContent = journal.heading;
              heading.appendChild(link);
              heading.appendChild(document.createTextNode(` (${journalCount})`));
            } else {
              heading.textContent = `${journal.heading} (${journalCount})`;
            }
            section.appendChild(heading);

            const list = document.createElement('ul');
            let journalNumber = journal.entries.length;
            journal.entries.forEach((entry) => {
              const item = document.createElement('li');
              item.className = 'publication-item';
              item.innerHTML = entry.html;

              const number = item.querySelector('.publication-number');
              if (number) {
                number.textContent = `[${journalNumber--}]`;
              }

              const category = document.createElement('div');
              category.className = 'talk-item-category';
              category.textContent = entry.category;
              item.appendChild(category);

              list.appendChild(item);
            });

            section.appendChild(list);
            journalView.appendChild(section);
          });

        const allViews = [categoryView, yearView, authorView, journalView];
        let activeViewName = 'category';
        allViews.forEach((view) => {
          const empty = document.createElement('p');
          empty.className = 'publication-filter-empty';
          empty.hidden = true;
          empty.textContent = 'No matching publications.';
          view.appendChild(empty);
        });

        const renderSearchResults = (keyword) => {
          if (!searchResults) return;
          searchResults.innerHTML = '';

          if (!keyword) {
            searchResults.hidden = true;
            publicationViews.hidden = false;
            if (typeof window.buildPageToc === 'function') {
              const visibleView =
                activeViewName === 'year' ? yearView :
                activeViewName === 'journal' ? journalView :
                activeViewName === 'author' ? authorView :
                categoryView;
              window.buildPageToc(visibleView);
            }
            return;
          }

          const sourceItems = Array.from(categoryView.querySelectorAll('.publication-item'));
          const matchedItems = sourceItems.filter((entry) => {
            if (!entry.dataset.searchText) {
              entry.dataset.searchText = entry.textContent.toLowerCase();
            }
            return entry.dataset.searchText.includes(keyword);
          });

          const section = document.createElement('section');
          section.className = 'publications-section';
          const heading = document.createElement('h3');
          heading.textContent = `Search Results (${matchedItems.length})`;
          section.appendChild(heading);

          if (matchedItems.length > 0) {
            const list = document.createElement('ul');
            matchedItems.forEach((entry) => {
              const clone = entry.cloneNode(true);
              clone.hidden = false;
              list.appendChild(clone);
            });
            section.appendChild(list);
          } else {
            const empty = document.createElement('p');
            empty.className = 'publication-filter-empty';
            empty.hidden = false;
            empty.textContent = 'No matching publications.';
            section.appendChild(empty);
          }

          searchResults.appendChild(section);
          searchResults.hidden = false;
          publicationViews.hidden = true;

          if (typeof window.buildPageToc === 'function') {
            window.buildPageToc(searchResults);
          }
        };

        const updateSectionVisibility = (container) => {
          const sections = Array.from(container.querySelectorAll('.publications-section'));
          sections.forEach((section) => {
            const visibleItems = Array.from(section.querySelectorAll('.publication-item')).filter((item) => !item.hidden);
            section.hidden = visibleItems.length === 0;
          });
        };

        const applyFilter = () => {
          const keyword = (searchInput?.value || '').trim().toLowerCase();
          const sourceEntries = Array.from(categoryView.querySelectorAll('.publication-item'));
          const matchedSourceCount = keyword
            ? sourceEntries.filter((entry) => {
                if (!entry.dataset.searchText) {
                  entry.dataset.searchText = entry.textContent.toLowerCase();
                }
                return entry.dataset.searchText.includes(keyword);
              }).length
            : 0;

          allViews.forEach((container) => {
            const entries = Array.from(container.querySelectorAll('.publication-item'));
            let visibleCount = 0;
            entries.forEach((entry) => {
              if (!entry.dataset.searchText) {
                entry.dataset.searchText = entry.textContent.toLowerCase();
              }
              const matched = !keyword || entry.dataset.searchText.includes(keyword);
              entry.hidden = !matched;
              if (matched) visibleCount += 1;
            });

            updateSectionVisibility(container);
            const empty = container.querySelector('.publication-filter-empty');
            if (empty) empty.hidden = visibleCount > 0;
          });

          if (searchStatus) {
            if (keyword) {
              searchStatus.textContent = `${matchedSourceCount} result${matchedSourceCount === 1 ? '' : 's'}`;
            } else {
              searchStatus.textContent = '';
            }
          }

          renderSearchResults(keyword);
        };

        const setView = (view) => {
          activeViewName = view;
          categoryView.hidden = view !== 'category';
          yearView.hidden = view !== 'year';
          authorView.hidden = view !== 'author';
          journalView.hidden = view !== 'journal';

          buttons.forEach((button) => {
            const active = button.dataset.view === view;
            button.classList.toggle('is-active', active);
            button.setAttribute('aria-pressed', active ? 'true' : 'false');
          });

          if (typeof window.buildPageToc === 'function') {
            const activeView =
              view === 'year' ? yearView :
              view === 'journal' ? journalView :
              view === 'author' ? authorView :
              categoryView;
            if (!(searchInput && searchInput.value.trim())) {
              window.buildPageToc(activeView);
            }
          }

          applyFilter();
        };

        buttons.forEach((button) => {
          button.addEventListener('click', () => setView(button.dataset.view));
        });

        if (searchInput) {
          searchInput.addEventListener('input', applyFilter);
        }

        setView('category');
      })();

      (function () {
        const path = window.location.pathname || '';
        const isTalks = /\/talks\/?$/.test(path);
        const isOutreach = /\/outreach\/?$/.test(path);
        const isSupervision = /\/supervision\/?$/.test(path);
        if (!isTalks && !isOutreach && !isSupervision) return;

        const monthPattern = '(Jan\\.?|Feb\\.?|Mar\\.?|Apr\\.?|May|Jun\\.?|Jul\\.?|Aug\\.?|Sep\\.?|Oct\\.?|Nov\\.?|Dec\\.?)';
        const trailingDateRegex = new RegExp(`,\\s*(${monthPattern}[^,<]*(?:present)?)$`, 'i');
        const parenthesizedPeriodRegex = new RegExp(`\\(([^)]*${monthPattern}[^)]*(?:present)?[^)]*)\\)`, 'gi');

        const wrapPeriods = (node) => {
          const original = node.innerHTML;
          let updated = original;
          updated = updated.replace(parenthesizedPeriodRegex, (_, period) => `(<span class="period-text">${period}</span>)`);
          updated = updated.replace(trailingDateRegex, (_, period) => `, <span class="period-text">${period}</span>`);
          if (updated !== original) node.innerHTML = updated;
        };

        if (isTalks) {
          document.querySelectorAll('.talk-item-event').forEach(wrapPeriods);
        }

        if (isOutreach || isSupervision) {
          document.querySelectorAll('.legacy-content li').forEach(wrapPeriods);
        }
      })();

      (function () {
        const badges = Array.from(document.querySelectorAll('.cv-current-badge'));
        if (!badges.length) return;

        const lists = Array.from(document.querySelectorAll('.cv-position-list'));
        if (!lists.length) return;
        const content = document.querySelector('.legacy-content');
        const path = window.location.pathname || '';
        const isSupervisionPage = /\/supervision\/?$/.test(path);

        let currentOnly = false;
        let toggleButton = null;

        const updateSectionCounts = () => {
          lists.forEach((list) => {
            const heading = list.previousElementSibling;
            if (!heading) return;
            const countEl = heading.querySelector('.dynamic-count[data-count-type="current-total"]');
            if (!countEl) return;

            const items = Array.from(list.querySelectorAll('.cv-position-item'));
            const total = Number(countEl.dataset.total || items.length || 0);
            const current = items.filter((item) => item.querySelector('.cv-current-badge')).length;
            const shown = currentOnly ? current : total;
            countEl.textContent = `(${shown})`;
          });
        };

        const applyCurrentFilter = () => {
          lists.forEach((list) => {
            const items = Array.from(list.querySelectorAll('.cv-position-item'));
            const hasCurrentItem = items.some((item) => item.querySelector('.cv-current-badge'));

            items.forEach((item) => {
              if (!currentOnly) {
                item.hidden = false;
                return;
              }
              if (!isSupervisionPage && !hasCurrentItem) {
                item.hidden = false;
                return;
              }
              item.hidden = !item.querySelector('.cv-current-badge');
            });
          });
          updateSectionCounts();

          badges.forEach((badge) => {
            badge.classList.toggle('is-filter-active', currentOnly);
            badge.setAttribute('title', currentOnly ? 'Show all' : 'Show current only');
          });

          if (toggleButton) {
            toggleButton.classList.toggle('is-active', currentOnly);
            toggleButton.textContent = currentOnly ? 'Show All' : 'Show Current Only';
            toggleButton.setAttribute('aria-pressed', currentOnly ? 'true' : 'false');
          }
        };

        if (content) {
          const toolbar = document.createElement('div');
          toolbar.className = 'current-filter-toolbar';

          toggleButton = document.createElement('button');
          toggleButton.type = 'button';
          toggleButton.className = 'current-filter-toggle';
          toggleButton.textContent = 'Show Current Only';
          toggleButton.setAttribute('aria-pressed', 'false');

          toggleButton.addEventListener('click', () => {
            currentOnly = !currentOnly;
            applyCurrentFilter();
          });

          toolbar.appendChild(toggleButton);
          content.insertBefore(toolbar, content.firstChild);
        }

        badges.forEach((badge) => {
          badge.addEventListener('click', () => {
            currentOnly = !currentOnly;
            applyCurrentFilter();
          });
        });

        applyCurrentFilter();
      })();

      (function () {
        const path = window.location.pathname || '';
        if (!/\/teaching\/?$/.test(path)) return;

        const content = document.querySelector('.legacy-content');
        if (!content) return;

        const termSections = Array.from(content.querySelectorAll('.teaching-term[data-teaching-term]'));
        if (!termSections.length) return;

        const month = new Date().getMonth() + 1;
        const year = new Date().getFullYear();
        let currentSeason = '';
        if (month >= 3 && month <= 6) currentSeason = 'spring';
        else if (month >= 7 && month <= 8) currentSeason = 'summer';
        else if (month >= 9 && month <= 12) currentSeason = 'fall';
        else currentSeason = 'winter';

        const parseTerm = (raw) => {
          const match = String(raw || '').trim().match(/^(\d{4})\s+(Spring|Summer|Fall|Winter)$/i);
          if (!match) return null;
          return {
            year: Number(match[1]),
            season: match[2].toLowerCase()
          };
        };

        const isCurrentTerm = (termText) => {
          const parsed = parseTerm(termText);
          if (!parsed) return false;
          if (parsed.season === 'winter') {
            return currentSeason === 'winter' && (parsed.year + 1) === year;
          }
          return parsed.year === year && parsed.season === currentSeason;
        };

        let currentCount = 0;
        termSections.forEach((section) => {
          const current = isCurrentTerm(section.dataset.teachingTerm);
          section.dataset.isCurrent = current ? 'true' : 'false';
          const badge = section.querySelector('.teaching-current-badge');
          if (badge) badge.hidden = !current;
          if (current) currentCount += 1;
        });
        if (!currentCount) return;

        let currentOnly = false;

        const toolbar = document.createElement('div');
        toolbar.className = 'current-filter-toolbar';

        const toggle = document.createElement('button');
        toggle.type = 'button';
        toggle.className = 'current-filter-toggle';
        toggle.textContent = 'Show Current Only';
        toggle.setAttribute('aria-pressed', 'false');

        const updateTeachingCounts = () => {
          const headings = Array.from(content.querySelectorAll('h3'));
          headings.forEach((heading) => {
            const countEl = heading.querySelector('.dynamic-count[data-count-type="current-total"]');
            if (!countEl) return;

            const total = Number(countEl.dataset.total || 0);
            let current = 0;
            let node = heading.nextElementSibling;
            while (node && node.tagName !== 'H3') {
              if (node.matches('.teaching-term[data-is-current]') && node.dataset.isCurrent === 'true') {
                current += node.querySelectorAll('.teaching-course-list li').length;
              }
              node = node.nextElementSibling;
            }
            const shown = currentOnly ? current : total;
            countEl.textContent = `(${shown})`;
          });
        };

        const applyFilter = () => {
          termSections.forEach((section) => {
            const isCurrent = section.dataset.isCurrent === 'true';
            section.hidden = currentOnly ? !isCurrent : false;
          });
          toggle.classList.toggle('is-active', currentOnly);
          toggle.textContent = currentOnly ? 'Show All' : 'Show Current Only';
          toggle.setAttribute('aria-pressed', currentOnly ? 'true' : 'false');
          updateTeachingCounts();
        };

        toggle.addEventListener('click', () => {
          currentOnly = !currentOnly;
          applyFilter();
        });

        toolbar.appendChild(toggle);
        content.insertBefore(toolbar, content.firstChild);
        applyFilter();
      })();

      (function () {
        const triggers = Array.from(document.querySelectorAll('[data-print-cv]'));
        if (!triggers.length) return;
        triggers.forEach((button) => {
          button.addEventListener('click', () => window.print());
        });
      })();

    </script>
  </body>
</html>
