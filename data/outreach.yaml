sections:
  - title: "International Mathematical Olympiad Activities"
    entries:
      - "Leader of the Korea Mathematical Olympiad team at [the 65th International Mathematical Olympiad](https://www.imo2024.uk) (IMO), Bath, **UK**, Jul 11-22, 2024."
      - "Leader of the Korea Mathematical Olympiad team at [the 64th International Mathematical Olympiad](https://imo2023.jp/en/) (IMO), Chiba, **Japan**, Jul 2-13, 2023."
      - "Leader of the Korea Mathematical Olympiad team at [The Cyberspace Mathematical Competition](https://artofproblemsolving.com/contests/cmc) (CMC), Jul 12-14, 2020."
      - "Deputy Leader of the Korea Mathematical Olympiad team at [the 61st International Mathematical Olympiad](https://imo2020.ru/) (IMO), A distributed IMO administered from St Petersburg, **Russia**, Sep 19-28, 2020."
      - "Deputy Leader of the Korea Mathematical Olympiad team at [the 60th International Mathematical Olympiad](https://www.imo2019.uk/) (IMO), Bath, **UK**, Jul 10-22, 2019."
      - "Deputy Leader of the Korea Mathematical Olympiad team at [the 59th International Mathematical Olympiad](https://imo2018.org.ro) (IMO), Cluj-Napoca, **Romania**, Jul 03-14, 2018."
      - "Deputy Leader of the Korea Mathematical Olympiad team at [the 58th International Mathematical Olympiad](https://www.imo2017.org.br/) (IMO), Rio de Janeiro, **Brazil**, Jul 12-23, 2017. (Scrap [1](http://www.edaily.co.kr/news/news_detail.asp?newsId=02207446615997472&mediaCodeNo=257))"
      - "Deputy Leader of the Korea Mathematical Olympiad team at [the 8th Romanian Master of Mathematics](http://rmms.lbi.ro/rmm2016/index.php?id=home) (RMM), Bucharest, **Romania**, Feb 24-29, 2016."
      - "Deputy Leader of the Korea Mathematical Olympiad team at [the 56th International Mathematical Olympiad](http://www.imo2015.org/index.php?lang=en) (IMO), Chiang Mai, **Thailand**, Jul 4-16, 2015. (Scrap [1](http://www.fnnews.com/news/201507161119231467))"
